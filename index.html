<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./public/pixel-vee.png" />
    <title>Pixel V - Free Online Pixel Art Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="canonical" href="https://pixelvee.netlify.app/" />
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="/src/main.jsx"></script>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-XGKLFJH336"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())
      gtag('config', 'G-XGKLFJH336')
    </script>
    <!--  Essential META Tags -->
    <meta property="og:title" content="Pixel Vee - Free Online Pixel Art Editor" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://pixelvee.netlify.app/public/link-preview.png" />
    <meta property="og:url" content="https://pixelvee.netlify.app/" />
    <meta name="twitter:card" content="summary_large_image" />

    <!--  Non-Essential, But Recommended -->
    <meta name="description" content="Pixel Vee is a free browser-based pixel art editor. Draw, animate, and export pixel art with tools for drawing, fill, curves, vector shapes, and more." />
    <meta property="og:description" content="Free browser-based pixel art editor with drawing, fill, curves, vector shapes, and more." />
    <meta property="og:site_name" content="Pixel Vee" />
    <meta name="twitter:image:alt" content="Pixel Vee pixel art editor interface" />
  </head>

  <body>
    <!-- React root: NavBar rendered here (~52px). Panels portaled into .page below. -->
    <div id="root"></div>

    <!-- Tooltip: queried by dom.js at module load -->
    <div id="tooltip" class="tooltip"></div>

    <!--
      Canvas stack + panel portal target.
      Canvas elements queried by src/Context/canvas.js at module load (script is deferred,
      so DOM is fully parsed before any JS runs). React panels are portaled in via App.jsx.
    -->
    <div class="page">
      <div class="canvas-container">
        <div class="bg-space">
          <canvas
            class="bg-canvas"
            id="background"
            width="512px"
            height="512px"
          ></canvas>
          <div class="canvas-layers"></div>
          <canvas
            class="onscreen-canvas"
            id="cursor-canvas"
            width="512px"
            height="512px"
          ></canvas>
          <canvas
            class="onscreen-canvas"
            id="selection-gui-canvas"
            width="512px"
            height="512px"
          ></canvas>
          <canvas
            class="onscreen-canvas"
            id="resize-overlay-canvas"
            width="512px"
            height="512px"
          ></canvas>
          <canvas
            class="onscreen-canvas"
            id="vector-gui-canvas"
            width="512px"
            height="512px"
          ></canvas>
        </div>
      </div>
    </div>
  </body>
</html>
